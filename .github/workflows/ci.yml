name: StreamHive CI/CD

on:
  push:
    branches: [ main ]   # <-- CHANGE: branch name if you don't use "main"

env:
  AWS_REGION: us-west-2                                   # <-- CHANGE: your AWS region
  ECR_REGISTRY: 876042377013.dkr.ecr.us-west-2.amazonaws.com   # <-- CHANGE: your AWS account ID + region
  FRONTEND_SERVICES: "home movies music gaming food-delivery streamwallet"
  BACKEND_SERVICE: "core-api"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, push and patch backend (core-api)
        run: |
          REPO_NAME="streamhive-${BACKEND_SERVICE}"
          aws ecr describe-repositories --repository-names "$REPO_NAME" --region $AWS_REGION || \
            aws ecr create-repository --repository-name "$REPO_NAME" --region $AWS_REGION

          docker build -t $ECR_REGISTRY/$REPO_NAME:${GITHUB_SHA} ./backend
          docker push $ECR_REGISTRY/$REPO_NAME:${GITHUB_SHA}

          sed -i "s|image: .*streamhive-${BACKEND_SERVICE}:.*|image: $ECR_REGISTRY/$REPO_NAME:${GITHUB_SHA}|" backend/core-api-deployment.yml

      - name: Build, push and patch each frontend service
        run: |
          for svc in $FRONTEND_SERVICES; do
            REPO_NAME="streamhive-${svc}"
            aws ecr describe-repositories --repository-names "$REPO_NAME" --region $AWS_REGION || \
              aws ecr create-repository --repository-name "$REPO_NAME" --region $AWS_REGION

            docker build -t $ECR_REGISTRY/$REPO_NAME:${GITHUB_SHA} ./frontend/$svc
            docker push $ECR_REGISTRY/$REPO_NAME:${GITHUB_SHA}

            sed -i "s|image: .*streamhive-${svc}:.*|image: $ECR_REGISTRY/$REPO_NAME:${GITHUB_SHA}|" frontend/$svc/deployment.yml
          done

      - name: Commit updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/core-api-deployment.yml frontend/*/deployment.yml
          git commit -m "ci: update image tags to ${GITHUB_SHA} [skip ci]" || echo "No changes to commit"
          git push
