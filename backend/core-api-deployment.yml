apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-api-deployment
  labels:
    app: core-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: core-api
  template:
    metadata:
      labels:
        app: core-api
    spec:
      containers:
        - name: core-api-container
          image: 891376951737.dkr.ecr.us-west-2.amazonaws.com/streamhive-core-api:2af4131ace99981ee51a4344e9e897c4dd9338c3
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: core-api-config

---
apiVersion: v1
kind: Service
metadata:
  name: core-api-service
spec:
  selector:
    app: core-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: ClusterIP
