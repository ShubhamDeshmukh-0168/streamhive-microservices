<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><title>StreamHive Food</title>
<style>
  body{margin:0;background:#fff8f0;color:#2b1a0f;font-family:Arial,sans-serif;}
  header{padding:20px 40px;background:#ff7a18;display:flex;justify-content:space-between;align-items:center;}
  header h1{color:#fff;margin:0;}
  a.back{color:#fff;text-decoration:none;font-size:13px;opacity:.85;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:18px;padding:40px;}
  .card{background:#fff;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.08);overflow:hidden;}
  .card img{width:100%;height:140px;object-fit:cover;}
  .card .body{padding:12px;}
  .card h4{margin:0 0 4px;}
  .card p{color:#777;font-size:13px;margin:0;}
  button{background:#ff7a18;color:#fff;border:none;padding:7px 12px;border-radius:6px;font-size:12px;margin-top:10px;cursor:pointer;}
</style>
</head>
<body>
<header><h1>🍔 StreamHive Food</h1><a class="back" href="/">← Back to Hive</a></header>
<div class="grid" id="restaurants"></div>
<script>
const dishes = [
  {id:"fd1", title:"Spicy Paneer Wrap - Hive Kitchen", price:189},
  {id:"fd2", title:"Margherita Pizza - Bella Crust", price:329},
  {id:"fd3", title:"Veg Biryani Combo - Spice Route", price:249},
  {id:"fd4", title:"Choco Lava Cake - Sweet Hive", price:99},
];
const el = document.getElementById('restaurants');
dishes.forEach(d => {
  el.innerHTML += `<div class="card">
    <img src="https://picsum.photos/seed/${d.id}/220/140" />
    <div class="body"><h4>${d.title}</h4><p>Rs. ${d.price}</p>
    <button onclick="addToWatchlist('${d.id}','${d.title}',${d.price})">+ Add to Order</button></div>
  </div>`;
});
function addToWatchlist(id, title, price){
  const email = localStorage.getItem('sh_email') || prompt('Enter your email to continue:');
  if(!email) return;
  localStorage.setItem('sh_email', email);
  fetch('/api/watchlist/items', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({email, item_id:id, item_title:title, price, category:'food-delivery'})
  }).then(r=>r.json()).then(d=>alert(d.message || d.error));
}
</script>
</body>
</html>
