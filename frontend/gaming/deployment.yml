apiVersion: apps/v1
kind: Deployment
metadata:
  name: gaming-deployment
  labels:
    app: gaming
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gaming
  template:
    metadata:
      labels:
        app: gaming
    spec:
      containers:
        - name: gaming-container
          image: 637423282941.dkr.ecr.us-west-2.amazonaws.com/streamhive-gaming:a328ef635b908eab0c66fe5c79a3168c07760782
          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: gaming-service
spec:
  selector:
    app: gaming
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
