apiVersion: apps/v1
kind: Deployment
metadata:
  name: home-deployment
  labels:
    app: home
spec:
  replicas: 2
  selector:
    matchLabels:
      app: home
  template:
    metadata:
      labels:
        app: home
    spec:
      containers:
        - name: home-container
          image: 891376951737.dkr.ecr.us-west-2.amazonaws.com/streamhive-home:2af4131ace99981ee51a4344e9e897c4dd9338c3
          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: home-service
spec:
  selector:
    app: home
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
