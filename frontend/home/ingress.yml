apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hive-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    # NOTE: no rewrite-target here on purpose. With rewrite-target: / every request
    # (including /api/... calls) was being rewritten to "/" before reaching the
    # backend, which broke POST /api/watchlist/items, /api/bookings, etc.
    # Each frontend's nginx.conf already falls back to index.html via try_files,
    # so dropping the rewrite keeps both pages and /api working correctly.
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: home-service
                port:
                  number: 80

          - path: /movies
            pathType: Prefix
            backend:
              service:
                name: movies-service
                port:
                  number: 80

          - path: /music
            pathType: Prefix
            backend:
              service:
                name: music-service
                port:
                  number: 80

          - path: /gaming
            pathType: Prefix
            backend:
              service:
                name: gaming-service
                port:
                  number: 80

          - path: /food-delivery
            pathType: Prefix
            backend:
              service:
                name: food-delivery-service
                port:
                  number: 80

          - path: /streamwallet
            pathType: Prefix
            backend:
              service:
                name: streamwallet-service
                port:
                  number: 80

          - path: /api
            pathType: Prefix
            backend:
              service:
                name: core-api-service
                port:
                  number: 80
