apiVersion: apps/v1
kind: Deployment
metadata:
  name: movies-deployment
  labels:
    app: movies
spec:
  replicas: 2
  selector:
    matchLabels:
      app: movies
  template:
    metadata:
      labels:
        app: movies
    spec:
      containers:
        - name: movies-container
          image: 891376951737.dkr.ecr.us-west-2.amazonaws.com/streamhive-movies:4b26d39583047a482bdcf8455c77ed8c343b7fde
          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: movies-service
spec:
  selector:
    app: movies
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
