<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><title>StreamHive Movies</title>
<style>
  body{margin:0;background:#0a0a0a;color:#eee;font-family:Arial,sans-serif;}
  header{padding:20px 40px;background:#140000;display:flex;justify-content:space-between;align-items:center;}
  header h1{color:#e11d48;margin:0;}
  a.back{color:#999;text-decoration:none;font-size:13px;}
  .banner{height:220px;background:linear-gradient(120deg,#1a0000,#2a0a14);display:flex;align-items:center;padding-left:40px;}
  .banner h2{font-size:32px;max-width:480px;}
  .row{padding:30px 40px;}
  .row h3{border-left:4px solid #e11d48;padding-left:10px;}
  .carousel{display:flex;gap:14px;overflow-x:auto;padding-bottom:10px;}
  .poster{flex:0 0 170px;background:#1a1a1a;border-radius:8px;overflow:hidden;cursor:pointer;transition:.2s;}
  .poster:hover{transform:scale(1.05);}
  .poster .thumb{width:100%;height:220px;display:flex;align-items:center;justify-content:center;font-size:42px;color:#fff;}
  .poster p{margin:8px;font-size:13px;}
  .free-tag{display:inline-block;background:#1ed760;color:#06140c;font-size:11px;font-weight:bold;padding:2px 8px;border-radius:10px;margin:0 8px;}
  button.watch{background:#e11d48;color:#fff;border:none;padding:7px 12px;border-radius:6px;font-size:12px;margin:0 8px 8px;cursor:pointer;width:calc(100% - 16px);}
  #player-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9000;align-items:center;justify-content:center;}
  #player-modal .box{background:#0a0a0a;border-radius:10px;padding:16px;max-width:90vw;}
  #player-modal video{max-width:80vw;max-height:70vh;border-radius:8px;}
  #player-modal button{margin-top:10px;background:#e11d48;border:none;color:#fff;padding:8px 16px;border-radius:6px;cursor:pointer;}

  /* Auth overlay */
  #auth-overlay{position:fixed;inset:0;background:#05050a;z-index:9999;display:flex;align-items:center;justify-content:center;font-family:Arial,sans-serif;}
  #auth-overlay .panel{background:#15152a;padding:30px;border-radius:12px;width:340px;color:#eee;}
  #auth-overlay .tabs{display:flex;margin-bottom:16px;}
  #auth-overlay .tabs button{flex:1;padding:8px;border:none;color:#fff;cursor:pointer;}
  #auth-overlay input{width:100%;padding:8px;margin-bottom:8px;border-radius:6px;border:1px solid #333;background:#0d0d1a;color:#fff;box-sizing:border-box;}
  #auth-overlay .primary-btn{width:100%;padding:10px;background:#a855f7;border:none;border-radius:6px;color:#fff;font-weight:bold;cursor:pointer;}
  #auth-overlay .otp-btn{width:100%;padding:10px;background:#1ed760;border:none;border-radius:6px;color:#06140c;font-weight:bold;cursor:pointer;margin-bottom:8px;}
  #auth-overlay .msg{font-size:12px;color:#f87171;min-height:16px;}
  #auth-overlay h3{margin:0 0 14px;color:#a855f7;text-align:center;}
</style>
</head>
<body>

<div id="auth-overlay">
  <div class="panel">
    <h3>🐝 Welcome to StreamHive</h3>
    <div class="tabs">
      <button id="tab-login" onclick="showTab('login')" style="background:#a855f7;border-radius:6px 0 0 6px;">Login</button>
      <button id="tab-signup" onclick="showTab('signup')" style="background:#222;border-radius:0 6px 6px 0;">Signup</button>
    </div>
    <div id="login-panel">
      <input id="login-email" placeholder="Email" />
      <input id="login-password" type="password" placeholder="Password" />
      <div id="login-otp-wrap" style="display:none;">
        <input id="login-otp" placeholder="Enter OTP from email" />
        <button class="otp-btn" onclick="verifyLoginOtp()">Verify OTP</button>
      </div>
      <button class="primary-btn" onclick="requestLogin()">Login</button>
      <p class="msg" id="login-msg"></p>
    </div>
    <div id="signup-panel" style="display:none;">
      <input id="signup-username" placeholder="Username" />
      <input id="signup-email" placeholder="Email" />
      <input id="signup-password" type="password" placeholder="Password (Aa1!...)" />
      <div id="signup-otp-wrap" style="display:none;">
        <input id="signup-otp" placeholder="Enter OTP from email" />
        <button class="otp-btn" onclick="verifySignupOtp()">Verify & Create Account</button>
      </div>
      <button class="primary-btn" onclick="requestSignup()">Sign Up</button>
      <p class="msg" id="signup-msg"></p>
    </div>
  </div>
</div>

<header><h1>🎬 StreamHive Movies</h1><a class="back" href="/">← Back to Hive</a></header>
<div class="banner"><h2>All movies are free to stream — no card required.</h2></div>
<div class="row">
  <h3>Trending Now</h3>
  <div class="carousel" id="trending"></div>
</div>

<div id="player-modal">
  <div class="box">
    <video id="player-video" controls autoplay></video><br/>
    <button onclick="closePlayer()">Close</button>
  </div>
</div>

<script>
// ---------- Movie catalog (all free) ----------
const movies = [
  {id:"mv1", title:"Midnight Horizon", icon:"🌌", color:"#1f1147"},
  {id:"mv2", title:"Crimson Tide City", icon:"🌆", color:"#5c1a1a"},
  {id:"mv3", title:"The Last Algorithm", icon:"🤖", color:"#0e3b4f"},
  {id:"mv4", title:"Echoes of Tomorrow", icon:"⏳", color:"#3a2a5c"},
  {id:"mv5", title:"Velvet Skyline", icon:"🌃", color:"#4a1f3d"},
];
// Public domain / royalty-free sample video used for the "watch" demo player
const SAMPLE_VIDEO = "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4";

const el = document.getElementById('trending');
movies.forEach(m => {
  el.innerHTML += `<div class="poster">
    <div class="thumb" style="background:${m.color};">${m.icon}</div>
    <p>${m.title}<br><span class="free-tag">FREE</span></p>
    <button class="watch" onclick="playMovie('${m.title}')">▶ Watch Free</button>
  </div>`;
});

function playMovie(title){
  requireAuth(() => {
    document.getElementById('player-modal').style.display = 'flex';
    document.getElementById('player-video').src = SAMPLE_VIDEO;
    logActivity('movies', 'watch:' + title);
  });
}
function closePlayer(){
  const v = document.getElementById('player-video');
  v.pause(); v.src = '';
  document.getElementById('player-modal').style.display = 'none';
}

// ---------- Auth gate (shared logic) ----------
function showTab(tab){
  document.getElementById('login-panel').style.display = tab==='login' ? 'block':'none';
  document.getElementById('signup-panel').style.display = tab==='signup' ? 'block':'none';
  document.getElementById('tab-login').style.background = tab==='login' ? '#a855f7':'#222';
  document.getElementById('tab-signup').style.background = tab==='signup' ? '#a855f7':'#222';
}
function checkAuth(){
  const session = JSON.parse(localStorage.getItem('sh_session') || 'null');
  if(session && session.email){
    document.getElementById('auth-overlay').style.display='none';
    localStorage.setItem('sh_email', session.email);
    return true;
  }
  document.getElementById('auth-overlay').style.display='flex';
  return false;
}
function requireAuth(callback){
  if(checkAuth()){ callback(); } else { showTab('login'); }
}
function requestSignup(){
  const username = document.getElementById('signup-username').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;
  fetch('/api/signup/request',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,email,password})})
    .then(r=>r.json()).then(d=>{
      document.getElementById('signup-msg').textContent = d.message || d.error;
      if(d.message){ document.getElementById('signup-otp-wrap').style.display='block'; }
    });
}
function verifySignupOtp(){
  const email = document.getElementById('signup-email').value.trim();
  const otp = document.getElementById('signup-otp').value.trim();
  fetch('/api/signup/verify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,otp})})
    .then(r=>r.json()).then(d=>{
      document.getElementById('signup-msg').textContent = d.message || d.error;
      if(d.message){ showTab('login'); }
    });
}
function requestLogin(){
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  fetch('/api/login/request',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})})
    .then(r=>r.json()).then(d=>{
      document.getElementById('login-msg').textContent = d.message || d.error;
      if(d.otp_required){ document.getElementById('login-otp-wrap').style.display='block'; }
      else if(d.user){ localStorage.setItem('sh_session', JSON.stringify({email})); checkAuth(); }
    });
}
function verifyLoginOtp(){
  const email = document.getElementById('login-email').value.trim();
  const otp = document.getElementById('login-otp').value.trim();
  fetch('/api/login/verify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,otp})})
    .then(r=>r.json()).then(d=>{
      document.getElementById('login-msg').textContent = d.message || d.error;
      if(d.user){ localStorage.setItem('sh_session', JSON.stringify({email})); checkAuth(); }
    });
}
function logActivity(appName, note){
  const email = localStorage.getItem('sh_email');
  if(!email) return;
  fetch('/api/activity',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email, app_name:appName, note})}).catch(()=>{});
}
checkAuth();
</script>
</body>
</html>
