apiVersion: apps/v1
kind: Deployment
metadata:
  name: food-delivery-deployment
  labels:
    app: food-delivery
spec:
  replicas: 2
  selector:
    matchLabels:
      app: food-delivery
  template:
    metadata:
      labels:
        app: food-delivery
    spec:
      containers:
        - name: food-delivery-container
          image: 876042377013.dkr.ecr.us-west-2.amazonaws.com/streamhive-food-delivery:latest
          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: food-delivery-service
spec:
  selector:
    app: food-delivery
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
