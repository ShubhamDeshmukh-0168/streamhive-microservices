<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><title>StreamHive Music</title>
<style>
  body{margin:0;background:#0b1f14;color:#eee;font-family:Arial,sans-serif;}
  header{padding:20px 40px;background:#06140c;display:flex;justify-content:space-between;align-items:center;}
  header h1{color:#1ed760;margin:0;}
  a.back{color:#999;text-decoration:none;font-size:13px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:18px;padding:40px;}
  .card{background:#13291c;border-radius:10px;padding:14px;cursor:pointer;transition:.2s;}
  .card:hover{background:#1c3a27;}
  .card img{width:100%;border-radius:8px;height:150px;object-fit:cover;}
  .card h4{margin:10px 0 2px;font-size:14px;}
  .card p{color:#9c9;font-size:12px;margin:0;}
  button{background:#1ed760;color:#06140c;border:none;padding:6px 10px;border-radius:20px;font-size:12px;margin-top:8px;cursor:pointer;font-weight:bold;}
</style>
</head>
<body>
<header><h1>🎵 StreamHive Music</h1><a class="back" href="/">← Back to Hive</a></header>
<div class="grid" id="albums"></div>
<script>
const albums = [
  {id:"al1", title:"Neon Nights", price:49},
  {id:"al2", title:"Acoustic Mornings", price:39},
  {id:"al3", title:"Bass Drop Vol.3", price:59},
  {id:"al4", title:"Lo-Fi Hive", price:29},
];
const el = document.getElementById('albums');
albums.forEach(a => {
  el.innerHTML += `<div class="card">
    <img src="https://picsum.photos/seed/${a.id}/180/150" />
    <h4>${a.title}</h4><p>Album · Rs. ${a.price}</p>
    <button onclick="addToWatchlist('${a.id}','${a.title}',${a.price})">+ Add</button>
  </div>`;
});
function addToWatchlist(id, title, price){
  const email = localStorage.getItem('sh_email') || prompt('Enter your email to continue:');
  if(!email) return;
  localStorage.setItem('sh_email', email);
  fetch('/api/watchlist/items', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({email, item_id:id, item_title:title, price, category:'music'})
  }).then(r=>r.json()).then(d=>alert(d.message || d.error));
}
</script>
</body>
</html>
