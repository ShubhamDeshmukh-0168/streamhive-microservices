apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: streamhive-frontend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ShubhamDeshmukh-0168/streamhive-microservices.git   # <-- CHANGE: your GitHub repo URL
    targetRevision: main                                        # <-- CHANGE: branch name if different
    path: frontend
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: microservices                                    # <-- CHANGE: namespace if different
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
